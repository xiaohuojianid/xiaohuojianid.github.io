<div class="my-6 p-4 border-l-4 rounded-r-lg {% if include.type == 'warning' %}border-amber-500 bg-amber-50 dark:bg-amber-950/30 text-amber-800 dark:text-amber-200{% elsif include.type == 'tip' %}border-green-500 bg-green-50 dark:bg-green-950/30 text-green-800 dark:text-green-200{% else %}border-brand-500 bg-brand-50 dark:bg-brand-950/30 text-brand-800 dark:text-brand-200{% endif %}">
  {% if include.title %}
  <p class="font-semibold mb-1">{{ include.title }}</p>
  {% endif %}
  <div class="text-sm">
    {{ include.content }}
  </div>
</div>
